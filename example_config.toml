# ─── Emergent Sovereignty — Tuned World Configuration ───────────────
#
# Goals of this config:
#   • Visible chemical gradients that form and shift over time
#   • Actors that survive long enough to exhibit movement and clustering
#   • Heat dynamics that create spatial heterogeneity
#   • Sources that create resource competition (mix of renewable + finite)
#   • Stable numerics: diffusion_rate * tick_duration * 8 < 1.0
#
# Grid: 60×60 = 3,600 cells. Large enough for spatial structure,
# small enough for fast iteration and clear visualization.

seed = 773

[grid]
width  = 100
height = 100
num_chemicals = 1                    # Actors sense and consume species 0 only
thermal_conductivity = 0.04          # Heat spreads slower than chemicals
ambient_heat = 0.2                   # Mild ambient — edges don't become dead zones
tick_duration = 1.0
num_threads = 1

# ─── World Initialization ───────────────────────────────────────────

[world_init]
min_initial_heat = 0.1
max_initial_heat = 0.6               # Warm baseline — not uniform, creates early gradients
min_initial_concentration = 0.0
max_initial_concentration = 0.3      # Light chemical dusting — sources dominate quickly

min_actors = 5
max_actors = 5                      # Enough actors for competition without grid saturation

# Heat sources: a few strong emitters create thermal "hotspots"
[world_init.heat_source_config]
min_sources = 2
max_sources = 3
min_emission_rate = 0.5
max_emission_rate = 3.0              # Strong enough to create visible thermal zones
renewable_fraction = 0.5             # Half are permanent, half deplete over time
min_reservoir_capacity = 100.0
max_reservoir_capacity = 1000.0       # Finite sources last 30–500 ticks depending on rate
min_deceleration_threshold = 0.01
max_deceleration_threshold = 0.1     # Gradual tapering as sources deplete
respawn_enabled = true               # Depleted non-renewable heat sources respawn after cooldown.
min_respawn_cooldown_ticks = 0       # Minimum ticks before a depleted source respawns.
max_respawn_cooldown_ticks = 10      # Maximum ticks before a depleted source respawns.
source_clustering = 0.96                # Spatial clustering of sources. 0.0 = uniform random, 1.0 = tight clusters. [0.0, 1.0].
source_dispersion = 1.0              # Inter-cluster dispersion. Controls how many distinct cluster centers sources
                                     # are distributed across. 0.0 = one shared center, 1.0 = one center per source.
                                     # Formula: num_clusters = max(1, round(source_dispersion * num_sources)). [0.0, 1.0].

# Chemical species 0: moderate count, low emission — actors out-consume any single source
[[world_init.chemical_species_configs]]
decay_rate = 0.005                   # Slow decay — sources must outpace it to build gradients
diffusion_rate = 0.03                # Moderate spread — gradients persist 10–20 ticks

[world_init.chemical_species_configs.source_config]
min_sources = 15
max_sources = 20
min_emission_rate = 0.6
max_emission_rate = 0.7              # Below consumption_rate (1.5) — actors drain sources
renewable_fraction = 0               # Mostly finite — forces migration as sources deplete
min_reservoir_capacity = 400.0
max_reservoir_capacity = 1000.0
min_deceleration_threshold = 0.001
max_deceleration_threshold = 0.01
respawn_enabled = true               # Depleted non-renewable chemical sources respawn after cooldown.
min_respawn_cooldown_ticks = 25      # Minimum ticks before a depleted source respawns.
max_respawn_cooldown_ticks = 100     # Maximum ticks before a depleted source respawns.
source_clustering = 0.95              # Spatial clustering of sources. 0.0 = uniform random, 1.0 = tight clusters. [0.0, 1.0].
source_dispersion = 0.6              # Inter-cluster dispersion. Controls how many distinct cluster centers sources
                                     # are distributed across. 0.0 = one shared center, 1.0 = one center per source.
                                     # Formula: num_clusters = max(1, round(source_dispersion * num_sources)). [0.0, 1.0].

# ─── Actor Configuration ────────────────────────────────────────────
#
# Tuning rationale:
#   • consumption_rate (1.5) > max source emission (0.8) — actors drain any single source
#   • energy_conversion_factor (1.8) — consuming 1.5 chemical yields 2.7 energy
#   • base_energy_decay (0.03) — slow drain, actors survive ~260 ticks idle at full energy
#   • base_movement_cost (0.1) — base cost at reference_energy; actual cost scales with energy
#   • initial_energy (8.0) — enough runway to find food, not enough to idle forever
#   • removal_threshold (-3.0) — inert actors linger briefly before cleanup

[actor]
consumption_rate = 1.5
energy_conversion_factor = 1.0
extraction_cost = 0.3                # Energy cost per unit of chemical consumed. Reduces net gain:
                                     # net = consumed * (energy_conversion_factor - extraction_cost).
                                     # Valid range: [0.0, energy_conversion_factor). Default: 0.2
base_energy_decay = 0.1
reference_metabolic_rate = 0.05   # Metabolic rate at which scaling multipliers equal 1.0.
                                     # Actors with base_energy_decay above this extract more energy,
                                     # move cheaper, and predate more effectively — but burn energy faster.
                                     # Must be > 0.0 and finite. Default: 0.05
initial_energy = 50.0
initial_actor_capacity = 64
base_movement_cost = 0.1             # Base energy cost for movement at the reference energy level.
                                     # Actual cost = base_movement_cost * (actor.energy / reference_energy),
                                     # floored at 10% of base. Must be >= 0.0.
reference_energy = 25.0              # Energy level at which movement cost equals base_movement_cost.
                                     # Actors above this are "heavier" and pay more to move;
                                     # actors below are "lighter" and pay less. Must be > 0.0.
removal_threshold = -3.0
max_energy = 100.0                   # Maximum energy an actor can hold. Must be > 0, finite, >= initial_energy.
                                     # Caps reserves and makes consumption demand-driven: saturated actors
                                     # stop extracting chemical, preserving it for neighbors and diffusion.
levy_exponent = 1.5                  # Power-law exponent α for Lévy flight step distribution.
                                     # Controls the mix of short vs long tumble runs. Must be > 1.0.
                                     # Lower values (closer to 1.0) → more long runs. Higher → shorter runs.
max_tumble_steps = 20                # Maximum steps in a single tumble run. Clamps the power-law sample.
                                     # Must be >= 1. Larger values allow longer ballistic exploration runs.
reproduction_threshold = 20.0        # Minimum energy for binary fission. Must be > 0 and >= reproduction_cost.
reproduction_cost = 12.0             # Energy deducted from parent upon fission. Must be > 0 and >= offspring_energy.
offspring_energy = 10.0              # Energy assigned to offspring at creation. Must be > 0 and <= max_energy.

# ── Contact Predation ───────────────────────────────────────────
# Adjacent actors may predate each other when the predator has strictly higher
# energy and the genetic distance between them meets the predator's kin_tolerance
# threshold. Prey energy is partially absorbed by the predator.

absorption_efficiency = 0.5          # Fraction of prey energy transferred to predator on successful
                                     # predation. Must be in (0.0, 1.0]. Default: 0.5.

# ── Heritable Trait Mutation ────────────────────────────────────
# Offspring inherit parent traits with proportional (multiplicative) mutation
# during fission: new_value = old_value * (1.0 + Normal(0, mutation_rate)).
# Nine traits are heritable: consumption_rate, base_energy_decay,
# levy_exponent, reproduction_threshold, max_tumble_steps,
# reproduction_cost, offspring_energy, mutation_rate, kin_tolerance.
# Each is clamped to its range.

mutation_stddev = 0.05               # Seed genome default for the per-actor heritable mutation_rate trait.
                                     # Each actor carries its own mutation_rate which evolves via self-referential
                                     # proportional mutation. Must be within [trait_mutation_rate_min, trait_mutation_rate_max].

trait_consumption_rate_min = 0.1     # Minimum heritable consumption_rate. Must be > 0.0.
trait_consumption_rate_max = 10.0    # Maximum heritable consumption_rate. Must be > min.
trait_base_energy_decay_min = 0.03  # Minimum heritable base_energy_decay. Must be > 0.0.
trait_base_energy_decay_max = 1.0    # Maximum heritable base_energy_decay. Must be > min.
trait_levy_exponent_min = 1.01       # Minimum heritable levy_exponent. Must be > 1.0.
trait_levy_exponent_max = 3.0        # Maximum heritable levy_exponent. Must be > min.
trait_reproduction_threshold_min = 1.0   # Minimum heritable reproduction_threshold. Must be > 0.0.
trait_reproduction_threshold_max = 100.0 # Maximum heritable reproduction_threshold. Must be > min.
trait_max_tumble_steps_min = 1           # Minimum heritable max_tumble_steps. Must be >= 1.
trait_max_tumble_steps_max = 50          # Maximum heritable max_tumble_steps. Must be > min.
trait_reproduction_cost_min = 0.1        # Minimum heritable reproduction_cost. Must be > 0.0.
trait_reproduction_cost_max = 100.0      # Maximum heritable reproduction_cost. Must be > min.
trait_offspring_energy_min = 0.1         # Minimum heritable offspring_energy. Must be > 0.0.
trait_offspring_energy_max = 100.0       # Maximum heritable offspring_energy. Must be > min and <= max_energy.
trait_mutation_rate_min = 0.001          # Minimum heritable mutation_rate. Must be > 0.0.
trait_mutation_rate_max = 0.5            # Maximum heritable mutation_rate. Must be > min.
kin_tolerance = 0.5                      # Seed genome default for heritable kin_tolerance trait.
                                         # Controls the genetic distance threshold below which predation
                                         # is suppressed. Low values → xenophobic; high → cosmopolitan.
                                         # Must be within [trait_kin_tolerance_min, trait_kin_tolerance_max].
trait_kin_tolerance_min = 0.0            # Minimum clamp bound for heritable kin_tolerance.
trait_kin_tolerance_max = 1.0            # Maximum clamp bound for heritable kin_tolerance. Must be > min.

# ── Reproduction Cooldown ───────────────────────────────────────
# Minimum ticks between successive reproductions. Creates a temporal gate
# on fission frequency, coupled with a continuous readiness metabolic cost
# that enforces r/K trade-off differentiation.

reproduction_cooldown = 5                # Seed genome default for heritable reproduction_cooldown trait.
                                         # Minimum ticks between successive reproductions. Must be within
                                         # [trait_reproduction_cooldown_min, trait_reproduction_cooldown_max].
trait_reproduction_cooldown_min = 1      # Minimum clamp bound for heritable reproduction_cooldown.
                                         # Must be >= 1 and < trait_reproduction_cooldown_max.
trait_reproduction_cooldown_max = 100    # Maximum clamp bound for heritable reproduction_cooldown.
                                         # Must be > trait_reproduction_cooldown_min.
readiness_sensitivity = 0.01            # Global sensitivity coefficient for reproductive readiness metabolic cost.
                                         # readiness_cost = readiness_sensitivity * (reproduction_cost + offspring_energy)
                                         #   / max(reproduction_cooldown, 1) / reference_cooldown
                                         # 0.0 disables the mechanic. Must be >= 0.0 and finite.
reference_cooldown = 5.0                 # Neutral cooldown for readiness cost normalization. At this cooldown,
                                         # the readiness multiplier equals 1.0 / reference_cooldown. Actors with
                                         # shorter cooldowns pay more; longer cooldowns pay less.
                                         # Must be > 0.0 and finite.

# ── Thermal Metabolism ──────────────────────────────────────────
# Actors pay an extra energy cost based on the squared mismatch between
# local cell heat and their heritable optimal_temp trait:
#   thermal_cost = thermal_sensitivity * (cell_heat - optimal_temp)^2
# This creates selective pressure for thermal specialization — populations
# near heat sources evolve higher optimal_temp, cooler regions evolve lower.

thermal_sensitivity = 0.1              # Quadratic penalty coefficient for thermal mismatch.
                                         # Higher values impose harsher penalties. Must be >= 0.0 and finite.
                                         # 0.0 disables the thermal penalty entirely.
optimal_temp = 0.5                       # Seed genome default for heritable optimal_temp trait.
                                         # Must be within [trait_optimal_temp_min, trait_optimal_temp_max].
trait_optimal_temp_min = 0.0             # Minimum clamp bound for heritable optimal_temp.
                                         # Must be < trait_optimal_temp_max.
trait_optimal_temp_max = 2.0             # Maximum clamp bound for heritable optimal_temp.
                                         # Must be > trait_optimal_temp_min. Headroom above typical
                                         # max_initial_heat allows adaptation to strong heat sources.

# ─── Bevy Visualization ────────────────────────────────────────────

[bevy]
tick_hz = 8.0          # Slightly slower than real-time — easier to observe dynamics
zoom_min = 0.1
zoom_max = 10.0
zoom_speed = 0.15
pan_speed = 1.5
color_scale_max = 2.0  # Matched to typical peak concentrations for good color range
stats_update_interval = 10  # Ticks between trait stats recomputations. 0 or 1 = every tick (no throttling).
                            # Higher values reduce CPU cost of the stats panel. Default: 10.
