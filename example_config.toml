# ─── Emergent Sovereignty — Tuned World Configuration ───────────────
#
# Goals of this config:
#   • Visible chemical gradients that form and shift over time
#   • Actors that survive long enough to exhibit movement and clustering
#   • Heat dynamics that create spatial heterogeneity
#   • Sources that create resource competition (mix of renewable + finite)
#   • Stable numerics: diffusion_rate * tick_duration * 8 < 1.0
#
# Grid: 60×60 = 3,600 cells. Large enough for spatial structure,
# small enough for fast iteration and clear visualization.

seed = 773

[grid]
width  = 500
height = 500
num_chemicals = 1                    # Actors sense and consume species 0 only
diffusion_rate = 0.08                # Moderate spread — gradients persist 10–20 ticks
thermal_conductivity = 0.04          # Heat spreads slower than chemicals
ambient_heat = 0.2                   # Mild ambient — edges don't become dead zones
tick_duration = 1.0
num_threads = 4
chemical_decay_rates = [0.005]        # Slow decay — sources must outpace it to build gradients

# ─── World Initialization ───────────────────────────────────────────

[world_init]
min_initial_heat = 0.1
max_initial_heat = 0.6               # Warm baseline — not uniform, creates early gradients
min_initial_concentration = 0.0
max_initial_concentration = 0.3      # Light chemical dusting — sources dominate quickly

min_actors = 200
max_actors = 400                      # Enough actors for competition without grid saturation

# Heat sources: a few strong emitters create thermal "hotspots"
[world_init.heat_source_config]
min_sources = 2
max_sources = 6
min_emission_rate = 0.5
max_emission_rate = 3.0              # Strong enough to create visible thermal zones
renewable_fraction = 0.5             # Half are permanent, half deplete over time
min_reservoir_capacity = 100.0
max_reservoir_capacity = 500.0       # Finite sources last 30–500 ticks depending on rate
min_deceleration_threshold = 0.2
max_deceleration_threshold = 0.4     # Gradual tapering as sources deplete
respawn_enabled = true               # Depleted non-renewable heat sources respawn after cooldown.
min_respawn_cooldown_ticks = 50      # Minimum ticks before a depleted source respawns.
max_respawn_cooldown_ticks = 150     # Maximum ticks before a depleted source respawns.

# Chemical sources: moderate count, low emission — actors out-consume any single source
[world_init.chemical_source_config]
min_sources = 50
max_sources = 75
min_emission_rate = 0.2
max_emission_rate = 0.8              # Below consumption_rate (1.5) — actors drain sources
renewable_fraction = 0             # Mostly finite — forces migration as sources deplete
min_reservoir_capacity = 150.0
max_reservoir_capacity = 600.0
min_deceleration_threshold = 0.15
max_deceleration_threshold = 0.35
respawn_enabled = true               # Depleted non-renewable chemical sources respawn after cooldown.
min_respawn_cooldown_ticks = 50      # Minimum ticks before a depleted source respawns.
max_respawn_cooldown_ticks = 150     # Maximum ticks before a depleted source respawns.

# ─── Actor Configuration ────────────────────────────────────────────
#
# Tuning rationale:
#   • consumption_rate (1.5) > max source emission (0.8) — actors drain any single source
#   • energy_conversion_factor (1.8) — consuming 1.5 chemical yields 2.7 energy
#   • base_energy_decay (0.03) — slow drain, actors survive ~260 ticks idle at full energy
#   • movement_cost (0.3) — moving is cheap relative to starvation, encourages exploration
#   • initial_energy (8.0) — enough runway to find food, not enough to idle forever
#   • removal_threshold (-3.0) — inert actors linger briefly before cleanup

[actor]
consumption_rate = 1.5
energy_conversion_factor = 1.8
extraction_cost = 0.2                # Energy cost per unit of chemical consumed. Reduces net gain:
                                     # net = consumed * (energy_conversion_factor - extraction_cost).
                                     # Valid range: [0.0, energy_conversion_factor). Default: 0.2
base_energy_decay = 0.01
initial_energy = 50.0
initial_actor_capacity = 64
movement_cost = 0.1
removal_threshold = -3.0
max_energy = 500.0                    # Maximum energy an actor can hold. Must be > 0, finite, >= initial_energy.
                                     # Caps reserves and makes consumption demand-driven: saturated actors
                                     # stop extracting chemical, preserving it for neighbors and diffusion.
levy_exponent = 1.5                  # Power-law exponent α for Lévy flight step distribution.
                                     # Controls the mix of short vs long tumble runs. Must be > 1.0.
                                     # Lower values (closer to 1.0) → more long runs. Higher → shorter runs.
max_tumble_steps = 20                # Maximum steps in a single tumble run. Clamps the power-law sample.
                                     # Must be >= 1. Larger values allow longer ballistic exploration runs.

# ─── Bevy Visualization ────────────────────────────────────────────

[bevy]
tick_hz = 8.0          # Slightly slower than real-time — easier to observe dynamics
zoom_min = 0.1
zoom_max = 10.0
zoom_speed = 0.15
pan_speed = 1.5
color_scale_max = 2.0  # Matched to typical peak concentrations for good color range
