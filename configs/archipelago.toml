# ─── Archipelago ─────────────────────────────────────────────────────
#
# Design intent:
#   Tight chemical source clusters ("islands") separated by vast empty space.
#   Actors must migrate between islands to survive. This is the scenario where
#   memory_capacity should actually pay for itself — remembering where the last
#   island was matters when you're crossing open water.
#
# Expected dynamics:
#   • Long Lévy flights selected for (low levy_exponent)
#   • Memory capacity should evolve upward (cognitive cost is low)
#   • Site fidelity should emerge around productive islands
#   • Population clusters around islands with migration corridors between them
#   • High mortality in the gaps — only efficient foragers survive transit
#
# Key knobs to tweak:
#   • source_clustering / source_dispersion — island tightness and spacing
#   • cognitive_cost_per_slot — lower = more memory evolution pressure
#   • renewable_fraction — 0.0 forces island-hopping as sources deplete

seed = 42

[grid]
width  = 300
height = 300
num_chemicals = 1
thermal_conductivity = 0.02          # Slow heat spread — thermal zones stay local
ambient_heat = 0.1                   # Cool baseline — islands of warmth stand out
tick_duration = 1.0
num_threads = 1

[world_init]
min_initial_heat = 0.05
max_initial_heat = 0.2               # Cool world — heat sources are the only warmth
min_initial_concentration = 0.0
max_initial_concentration = 0.05     # Almost no ambient chemical — sources are everything
min_actors = 80
max_actors = 120

# Heat sources: co-located with chemical islands
[world_init.heat_source_config]
min_sources = 5
max_sources = 8
min_emission_rate = 0.3
max_emission_rate = 1.5
renewable_fraction = 0.7             # Most heat is permanent — thermal landmarks
min_reservoir_capacity = 500.0
max_reservoir_capacity = 1500.0
min_deceleration_threshold = 0.05
max_deceleration_threshold = 0.2
respawn_enabled = false              # Finite heat sources don't come back
source_clustering = 0.98             # Very tight clusters
source_dispersion = 0.15             # Few distinct cluster centers — true islands

[[world_init.chemical_species_configs]]
decay_rate = 0.01                    # Slow decay — gradients persist, marking island locations
diffusion_rate = 0.02                # Low spread — chemicals stay near their source

[world_init.chemical_species_configs.source_config]
min_sources = 60
max_sources = 80
min_emission_rate = 0.4
max_emission_rate = 0.8
renewable_fraction = 0.3             # Most sources deplete — forces migration
min_reservoir_capacity = 300.0
max_reservoir_capacity = 800.0
min_deceleration_threshold = 0.01
max_deceleration_threshold = 0.05
respawn_enabled = true               # Islands eventually regenerate
min_respawn_cooldown_ticks = 200     # But it takes a long time
max_respawn_cooldown_ticks = 500
source_clustering = 0.99             # Extremely tight — sources are on top of each other
source_dispersion = 0.08             # 4-6 distinct islands on the map

[actor]
consumption_rate = 1.2
energy_conversion_factor = 1.2       # Slightly generous — reward finding an island
extraction_cost = 0.2
base_energy_decay = 0.08             # Moderate burn — can survive ~125 ticks idle at 10 energy
reference_metabolic_rate = 0.05
initial_energy = 12.0
initial_actor_capacity = 128
base_movement_cost = 0.05            # Cheap movement — migration shouldn't be prohibitive
reference_energy = 20.0
removal_threshold = -3.0
max_energy = 80.0
levy_exponent = 1.3                  # Start with long-range bias
max_tumble_steps = 15
reproduction_threshold = 20.0
reproduction_cost = 10.0
offspring_energy = 6.0
absorption_efficiency = 0.4
mutation_stddev = 0.08

# Trait clamps
trait_consumption_rate_min = 0.1
trait_consumption_rate_max = 8.0
trait_base_energy_decay_min = 0.02
trait_base_energy_decay_max = 0.5
trait_levy_exponent_min = 1.01
trait_levy_exponent_max = 3.0
trait_reproduction_threshold_min = 5.0
trait_reproduction_threshold_max = 80.0
trait_max_tumble_steps_min = 1
trait_max_tumble_steps_max = 40
trait_reproduction_cost_min = 2.0
trait_reproduction_cost_max = 60.0
trait_offspring_energy_min = 1.0
trait_offspring_energy_max = 40.0
trait_mutation_rate_min = 0.01
trait_mutation_rate_max = 0.3
kin_tolerance = 0.4
trait_kin_tolerance_min = 0.02
trait_kin_tolerance_max = 1.0
kin_group_defense = 0.3
trait_kin_group_defense_min = 0.0
trait_kin_group_defense_max = 1.0
reproduction_cooldown = 8
trait_reproduction_cooldown_min = 1
trait_reproduction_cooldown_max = 80
readiness_sensitivity = 0.08         # Lower than default — don't over-penalize fast reproducers
reference_cooldown = 8.0
memory_capacity = 6                  # Start with decent memory — let evolution decide
trait_memory_capacity_min = 0
trait_memory_capacity_max = 16
cognitive_cost_per_slot = 0.002      # Cheap cognition — memory should be viable here
site_fidelity_strength = 1.5
trait_site_fidelity_strength_min = 0.0
trait_site_fidelity_strength_max = 5.0
avoidance_sensitivity = 0.8
trait_avoidance_sensitivity_min = 0.0
trait_avoidance_sensitivity_max = 5.0
thermal_sensitivity = 0.05           # Mild thermal pressure
optimal_temp = 0.3
trait_optimal_temp_min = 0.0
trait_optimal_temp_max = 10.0
thermal_fitness_width = 0.8          # Wide comfort zone — thermal isn't the main pressure here
thermal_movement_cap = 3.0

[bevy]
tick_hz = 10.0
zoom_min = 0.1
zoom_max = 10.0
zoom_speed = 0.15
pan_speed = 1.5
color_scale_max = 3.0
stats_update_interval = 10
