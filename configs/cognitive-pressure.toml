# THE MAIN EVENT — memory and sensing tuning
memory_capacity = 8                  # High seed — give memory a head start
trait_memory_capacity_min = 0
trait_memory_capacity_max = 16
cognitive_cost_per_slot = 0.001      # Very cheap cognition — memory should be viable
site_fidelity_strength = 2.0         # Strong site fidelity seed
trait_site_fidelity_strength_min = 0.0
trait_site_fidelity_strength_max = 5.0
avoidance_sensitivity = 2.0          # Strong avoidance seed
trait_avoidance_sensitivity_min = 0.0
trait_avoidance_sensitivity_max = 5.0

thermal_sensitivity = 0.06
optimal_temp = 0.4
trait_optimal_temp_min = 0.0
trait_optimal_temp_max = 15.0
thermal_fitness_width = 0.6
thermal_movement_cap = 4.0

[bevy]
tick_hz = 10.0
zoom_min = 0.1
zoom_max = 10.0
zoom_speed = 0.15
pan_speed = 1.5
color_scale_max = 3.0
stats_update_interval = 10
