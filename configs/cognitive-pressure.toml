# ─── Cognitive Pressure ──────────────────────────────────────────────
#
# Design intent:
#   Tuned so that memory-biased sensing has a real evolutionary payoff.
#   Clustered sources that respawn create "known good locations" worth
#   remembering. Active predation creates "known bad locations" worth
#   avoiding. Cognitive cost is low enough that memory can compete.
#
# Expected dynamics:
#   • memory_capacity should evolve upward (unlike the default config where it crashed to 0)
#   • site_fidelity_strength should increase — actors return to productive patches
#   • avoidance_sensitivity should increase — actors flee predation hotspots
#   • Spatial segregation: smart actors cluster at known sources, memoryless actors wander
#   • Predation creates information value — remembering threats saves lives
#   • Possible cognitive arms race between predators and prey
#
# Key knobs to tweak:
#   • cognitive_cost_per_slot — the critical parameter for memory viability
#   • source respawn cooldown — faster respawn = more value in remembering locations
#   • predation rate (actor density + absorption_efficiency) — more predation = more avoidance value

seed = 1618

[grid]
width  = 200
height = 200
num_chemicals = 1
thermal_conductivity = 0.04
ambient_heat = 0.2
tick_duration = 1.0
num_threads = 1

[world_init]
min_initial_heat = 0.1
max_initial_heat = 0.4
min_initial_concentration = 0.05
max_initial_concentration = 0.2
min_actors = 100
max_actors = 140                     # Moderate density — enough for predation encounters

[world_init.heat_source_config]
min_sources = 4
max_sources = 6
min_emission_rate = 0.4
max_emission_rate = 1.5
renewable_fraction = 0.7
min_reservoir_capacity = 500.0
max_reservoir_capacity = 1200.0
min_deceleration_threshold = 0.05
max_deceleration_threshold = 0.15
respawn_enabled = true
min_respawn_cooldown_ticks = 20
max_respawn_cooldown_ticks = 60
source_clustering = 0.8
source_dispersion = 0.4

[[world_init.chemical_species_configs]]
decay_rate = 0.008
diffusion_rate = 0.03

[world_init.chemical_species_configs.source_config]
min_sources = 80
max_sources = 100
min_emission_rate = 0.5
max_emission_rate = 0.8
renewable_fraction = 0.2
min_reservoir_capacity = 250.0
max_reservoir_capacity = 600.0
min_deceleration_threshold = 0.02
max_deceleration_threshold = 0.08
respawn_enabled = true
min_respawn_cooldown_ticks = 40      # Sources come back — remembering their location pays off
max_respawn_cooldown_ticks = 120
source_clustering = 0.92             # Tight clusters — "patches" worth remembering
source_dispersion = 0.12             # Few distinct patches

[actor]
consumption_rate = 1.3
energy_conversion_factor = 1.1
extraction_cost = 0.2
base_energy_decay = 0.09
reference_metabolic_rate = 0.05
initial_energy = 14.0
initial_actor_capacity = 256
base_movement_cost = 0.07
reference_energy = 22.0
removal_threshold = -3.0
max_energy = 70.0
levy_exponent = 1.4
max_tumble_steps = 12
reproduction_threshold = 22.0
reproduction_cost = 10.0
offspring_energy = 7.0
absorption_efficiency = 0.55         # Decent predation payoff — creates threat worth avoiding
mutation_stddev = 0.10

# Trait clamps
trait_consumption_rate_min = 0.1
trait_consumption_rate_max = 8.0
trait_base_energy_decay_min = 0.02
trait_base_energy_decay_max = 0.6
trait_levy_exponent_min = 1.01
trait_levy_exponent_max = 3.0
trait_reproduction_threshold_min = 5.0
trait_reproduction_threshold_max = 80.0
trait_max_tumble_steps_min = 1
trait_max_tumble_steps_max = 40
trait_reproduction_cost_min = 2.0
trait_reproduction_cost_max = 60.0
trait_offspring_energy_min = 1.0
trait_offspring_energy_max = 50.0
trait_mutation_rate_min = 0.02
trait_mutation_rate_max = 0.35
kin_tolerance = 0.4
trait_kin_tolerance_min = 0.02
trait_kin_tolerance_max = 1.0
kin_group_defense = 0.4
trait_kin_group_defense_min = 0.0
trait_kin_group_defense_max = 1.0
reproduction_cooldown = 6
trait_reproduction_cooldown_min = 1
trait_reproduction_cooldown_max = 60
